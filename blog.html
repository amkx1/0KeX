<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <title>Blog Post | kelog</title>
    <style>
        :root {
            --red: #dc3545;
            --red-dim: rgba(220, 53, 69, 0.12);
            --border-red: rgba(220, 53, 69, 0.2);
            --bg: #0e0e0e;
            --bg2: #141414;
            --border: rgba(255, 255, 255, 0.06);
            --text: #c8c8c8;
            --text-dim: #555;
            --text-mid: #888;
            --mono: 'JetBrains Mono', monospace;
            --prose: 'Inter', -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--prose);
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            font-size: 16px;
            line-height: 1.7;
        }

        /* ── HEADER ── */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(14, 14, 14, 0.9);
            backdrop-filter: blur(16px);
            padding: 0 5%;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: var(--mono);
            font-size: 1.15rem;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            letter-spacing: 2px;
        }

        nav {
            display: flex;
            gap: 0.2rem;
        }

        nav a {
            font-family: var(--mono);
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.78rem;
            padding: 0.3rem 0.75rem;
            border-radius: 4px;
            transition: all 0.15s;
            border: 1px solid transparent;
        }

        nav a:hover,
        nav a.active {
            color: #fff;
            background: var(--red-dim);
            border-color: var(--border-red);
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: space-around;
            width: 26px;
            height: 26px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 100%;
            height: 1.5px;
            background: var(--red);
        }

        /* ── LAYOUT ── */
        main {
            padding-top: 54px;
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            padding-left: 5%;
            padding-right: 5%;
            gap: 4rem;
        }

        /* ── TOC SIDEBAR ── */
        .toc-sidebar {
            position: sticky;
            top: 80px;
            width: 220px;
            height: fit-content;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            flex-shrink: 0;
            padding-top: 2.5rem;
        }

        .toc-sidebar::-webkit-scrollbar {
            width: 3px;
        }

        .toc-sidebar::-webkit-scrollbar-thumb {
            background: var(--border-red);
        }

        .toc-title {
            font-family: var(--mono);
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 1rem;
            text-align: right;
        }

        .toc-list {
            list-style: none;
        }

        .toc-link {
            display: block;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.78rem;
            font-family: var(--prose);
            padding: 0.3rem 0.8rem 0.3rem 0;
            border-right: 1px solid var(--border);
            text-align: right;
            transition: color 0.15s, border-color 0.15s;
            line-height: 1.4;
            margin-bottom: 0.1rem;
        }

        .toc-link:hover {
            color: var(--text);
            border-right-color: var(--text-mid);
        }

        .toc-link.active {
            color: var(--red);
            border-right-color: var(--red);
        }

        .toc-item.h3 .toc-link {
            font-size: 0.73rem;
            padding-right: 1.5rem;
            color: #444;
        }

        .toc-item.h3 .toc-link:hover {
            color: var(--text-mid);
        }

        /* ── CONTENT ── */
        .content-wrapper {
            flex: 1;
            min-width: 0;
            padding-top: 2.5rem;
            padding-bottom: 5rem;
            max-width: 680px;
        }

        /* Back link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--text-dim);
            text-decoration: none;
            margin-bottom: 2.5rem;
            transition: color 0.15s;
        }

        .back-link:hover {
            color: var(--text);
        }

        .back-link i {
            font-size: 0.65rem;
        }

        /* Blog header */
        .blog-header {
            margin-bottom: 3rem;
        }

        .blog-meta {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }

        .blog-date {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        .blog-category {
            font-family: var(--mono);
            font-size: 0.65rem;
            padding: 0.15rem 0.55rem;
            background: var(--red-dim);
            border: 1px solid var(--border-red);
            color: var(--red);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 3px;
        }

        .blog-title {
            font-family: var(--prose);
            font-size: 2rem;
            font-weight: 500;
            color: #e8e8e8;
            line-height: 1.3;
            margin-bottom: 1rem;
            letter-spacing: -0.3px;
        }

        .blog-tags {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .tag {
            font-family: var(--mono);
            font-size: 0.65rem;
            padding: 0.15rem 0.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: 3px;
        }

        /* Divider */
        .header-rule {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 2rem 0;
        }

        /* ── PROSE CONTENT ── */
        .blog-content {
            font-family: var(--prose);
            font-size: 1rem;
            line-height: 1.85;
            color: #b8b8b8;
            font-weight: 300;
        }

        .blog-content h2 {
            font-family: var(--prose);
            font-size: 1.35rem;
            font-weight: 500;
            color: #ddd;
            margin-top: 2.8rem;
            margin-bottom: 1rem;
            scroll-margin-top: 80px;
        }

        .blog-content h3 {
            font-family: var(--prose);
            font-size: 1.1rem;
            font-weight: 500;
            color: #ccc;
            margin-top: 2rem;
            margin-bottom: 0.8rem;
            scroll-margin-top: 80px;
        }

        .blog-content p {
            margin-bottom: 1.4rem;
        }

        .blog-content a {
            color: #c77;
            text-decoration: none;
            border-bottom: 1px solid rgba(200, 100, 100, 0.25);
            transition: color 0.15s, border-color 0.15s;
        }

        .blog-content a:hover {
            color: var(--red);
            border-bottom-color: var(--red);
        }

        /* Inline code */
        .blog-content code {
            font-family: var(--mono);
            font-size: 0.83rem;
            background: rgba(255, 255, 255, 0.05);
            color: #e8957a;
            padding: 0.15rem 0.45rem;
            border-radius: 3px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* Code blocks */
        .code-block {
            position: relative;
            margin: 1.8rem 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.07);
            background: #0d0d0d;
        }

        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.45rem 1rem;
            background: #161616;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Traffic light dots */
        .code-dots {
            display: flex;
            gap: 0.35rem;
            align-items: center;
        }

        .code-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
        }

        .code-dot.r {
            background: #ff5f57;
        }

        .code-dot.y {
            background: #ffbd2e;
        }

        .code-dot.g {
            background: #28ca41;
        }

        .code-lang {
            font-family: var(--mono);
            font-size: 0.63rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .copy-btn {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-family: var(--mono);
            font-size: 0.62rem;
            color: var(--text-dim);
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 3px;
            padding: 0.18rem 0.55rem;
            cursor: pointer;
            transition: color 0.1s, border-color 0.1s, background 0.1s;
        }

        .copy-btn:hover {
            color: #ccc;
            border-color: rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.04);
        }

        .copy-btn.copied {
            color: #4ec94e;
            border-color: rgba(78, 201, 78, 0.3);
        }

        .blog-content pre {
            background: #0d0d0d;
            padding: 1.2rem 1.4rem;
            overflow-x: auto;
            line-height: 1.7;
            margin: 0;
            border-radius: 0;
        }

        .blog-content pre code {
            background: none;
            border: none;
            padding: 0;
            color: #d4d4d4;
            font-size: 0.82rem;
        }

        .blog-content pre::-webkit-scrollbar {
            height: 3px;
        }

        .blog-content pre::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
        }

        /* Lists */
        .blog-content ul,
        .blog-content ol {
            margin-left: 1.4rem;
            margin-bottom: 1.4rem;
        }

        .blog-content li {
            margin-bottom: 0.5rem;
        }

        .blog-content ul li::marker {
            color: var(--red);
        }

        /* Blockquote */
        .blog-content blockquote {
            border-left: 2px solid rgba(220, 53, 69, 0.35);
            padding: 0.8rem 1.4rem;
            margin: 1.8rem 0;
            color: var(--text-mid);
            font-style: italic;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 0 4px 4px 0;
        }

        .blog-content blockquote p {
            margin-bottom: 0;
        }

        /* HR */
        .blog-content hr {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 2.5rem 0;
        }

        /* Images */
        .blog-content img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            margin: 1.8rem 0;
            border: 1px solid var(--border);
        }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-dim);
            font-size: 0.72rem;
            font-family: var(--mono);
            border-top: 1px solid var(--border);
        }

        footer span {
            color: var(--red);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 1000px) {
            .toc-sidebar {
                display: none;
            }

            main {
                gap: 0;
            }
        }

        @media (max-width: 768px) {
            main {
                padding-left: 5%;
                padding-right: 5%;
            }

            .blog-title {
                font-size: 1.6rem;
            }

            nav {
                position: fixed;
                top: 54px;
                right: -100%;
                width: 240px;
                height: calc(100vh - 54px);
                background: rgba(14, 14, 14, 0.98);
                backdrop-filter: blur(16px);
                flex-direction: column;
                gap: 0;
                padding: 1.5rem;
                border-left: 1px solid var(--border);
                transition: right 0.3s;
            }

            nav.active {
                right: 0;
            }

            nav a {
                padding: 0.8rem 1rem;
                border-bottom: 1px solid var(--border);
                border-radius: 0;
                font-size: 0.82rem;
            }

            .menu-toggle {
                display: flex;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="index.html" class="logo">KΞLØG</a>
        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        <nav id="nav">
            <a href="index.html">home</a>
            <a href="about.html">about</a>
            <a href="projects.html">projects</a>
            <a href="blogs.html" class="active">blog</a>
            <a href="contact.html">contact</a>
        </nav>
    </header>

    <main>
        <!-- Content -->
        <div class="content-wrapper">

            <a href="blogs.html" class="back-link">
                <i class="fas fa-arrow-left"></i> back to blogs
            </a>

            <div class="blog-header">
                <div class="blog-meta">
                    <span class="blog-date" id="blogDateText"></span>
                    <span class="blog-category" id="blogCategory"></span>
                </div>
                <h1 class="blog-title" id="blogTitle"></h1>
                <div class="blog-tags" id="blogTags"></div>
            </div>

            <hr class="header-rule">

            <div class="blog-content" id="blogContent"></div>

        </div>

        <!-- TOC — right side -->
        <aside class="toc-sidebar" id="toc">
            <div class="toc-title">On this page</div>
            <ul class="toc-list" id="tocList"></ul>
        </aside>
    </main>

    <footer>
        <p>© 2026 kelog. Stay <span>curious</span>.</p>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('nav').classList.toggle('active');
        }

        function generateTOC() {
            const content = document.getElementById('blogContent');
            const tocList = document.getElementById('tocList');
            const headings = content.querySelectorAll('h2, h3');

            if (headings.length === 0) {
                document.getElementById('toc').style.display = 'none';
                return;
            }

            headings.forEach((heading, i) => {
                heading.id = `h-${i}`;
                const li = document.createElement('li');
                li.className = `toc-item ${heading.tagName.toLowerCase()}`;
                const a = document.createElement('a');
                a.href = `#h-${i}`;
                a.className = 'toc-link';
                a.textContent = heading.textContent;
                a.onclick = (e) => {
                    e.preventDefault();
                    heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
                };
                li.appendChild(a);
                tocList.appendChild(li);
            });

            window.addEventListener('scroll', updateActiveTOC, { passive: true });
            updateActiveTOC();
        }

        function updateActiveTOC() {
            const headings = document.querySelectorAll('.blog-content h2, .blog-content h3');
            const links = document.querySelectorAll('.toc-link');
            let current = null;

            headings.forEach(h => {
                if (h.getBoundingClientRect().top <= 120) current = h.id;
            });

            links.forEach(l => {
                l.classList.toggle('active', l.getAttribute('href') === `#${current}`);
            });
        }

        function wrapCodeBlocks() {
            const blocks = document.querySelectorAll('.blog-content pre');
            blocks.forEach(pre => {
                const code = pre.querySelector('code');
                let lang = '';
                if (code) {
                    const match = [...code.classList].find(c => c.startsWith('language-'));
                    if (match) lang = match.replace('language-', '');
                }

                const wrapper = document.createElement('div');
                wrapper.className = 'code-block';

                const header = document.createElement('div');
                header.className = 'code-header';
                header.style.position = 'relative';
                header.innerHTML = `
                    <div class="code-dots">
                        <span class="code-dot r"></span>
                        <span class="code-dot y"></span>
                        <span class="code-dot g"></span>
                    </div>
                    <span class="code-lang">${lang || 'code'}</span>
                    <button class="copy-btn" onclick="copyCode(this)">
                        <i class="far fa-copy"></i> copy
                    </button>
                `;

                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(header);
                wrapper.appendChild(pre);
            });
        }

        function copyCode(btn) {
            const pre = btn.closest('.code-block').querySelector('pre');
            const text = pre.innerText;
            navigator.clipboard.writeText(text).then(() => {
                btn.innerHTML = '<i class="fas fa-check"></i> copied';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = '<i class="far fa-copy"></i> copy';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        async function loadBlog() {
            const id = parseInt(new URLSearchParams(window.location.search).get('id'));
            try {
                const res = await fetch('blogs.json');
                const data = await res.json();
                const blog = data.blogs.find(b => b.id === id);

                if (blog) {
                    document.getElementById('blogDateText').textContent = blog.date;
                    document.getElementById('blogCategory').textContent = blog.category;
                    document.getElementById('blogTitle').textContent = blog.title;
                    document.getElementById('blogContent').innerHTML = blog.content;
                    document.title = `${blog.title} | kelog`;

                    blog.tags?.forEach(tag => {
                        const t = document.createElement('span');
                        t.className = 'tag';
                        t.textContent = tag;
                        document.getElementById('blogTags').appendChild(t);
                    });

                    generateTOC();
                    wrapCodeBlocks();
                } else {
                    document.getElementById('blogContent').innerHTML = '<p>Post not found.</p>';
                    document.getElementById('toc').style.display = 'none';
                }
            } catch {
                document.getElementById('blogContent').innerHTML = '<p>Could not load post.</p>';
                document.getElementById('toc').style.display = 'none';
            }
        }

        loadBlog();
    </script>
</body>

</html>
