<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Blogs | kelog</title>
    <style>
        /* ── BLOGS PAGE SPECIFIC ── */

        .blogs-wrap {
            padding-bottom: 4rem;
        }

        /* ── CATEGORY GROUP ── */
        .category-group {
            margin-bottom: 1.6rem;
        }

        /* Directory-style header */
        .category-toggle {
            width: 100%;
            background: none;
            border: none;
            padding: 0.3rem 0;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: none;
        }

        /* Arrow: ▶ closed, ▼ open */
        .dir-arrow {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--red);
            width: 10px;
            flex-shrink: 0;
            transition: none;
            user-select: none;
        }

        .category-group.open .dir-arrow::before {
            content: '▼';
        }

        .category-group:not(.open) .dir-arrow::before {
            content: '▶';
        }

        .dir-folder {
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--yellow);
        }

        .category-group.open .dir-folder::before {
            content: '📂 ';
            font-size: 0.75rem;
        }

        .category-group:not(.open) .dir-folder::before {
            content: '📁 ';
            font-size: 0.75rem;
        }

        .category-name {
            font-family: var(--mono);
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--yellow);
            letter-spacing: 0.5px;
        }

        .category-toggle:hover .category-name {
            color: #fff;
        }

        .category-toggle:hover .dir-folder {
            opacity: 0.8;
        }

        .category-count {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-left: 0.2rem;
        }

        /* ── COLLAPSIBLE BODY ── */
        .category-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            /* Tree indent line */
            margin-left: 0.85rem;
            padding-left: 1.1rem;
            border-left: 1px solid rgba(220, 53, 69, 0.2);
        }

        .category-group.open .category-body {
            max-height: 2000px;
        }

        /* ── BLOG ROW ── */
        .blog-row {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: baseline;
            gap: 1rem;
            padding: 0.55rem 0.6rem;
            cursor: pointer;
            position: relative;
            transition: background 0.08s;
            border-radius: 4px;
        }

        /* file icon prefix */
        .blog-row-title::before {
            content: '├─ ';
            color: var(--text-dim);
            font-size: 0.72rem;
        }

        .blog-row:last-child .blog-row-title::before {
            content: '└─ ';
        }

        .blog-row:hover {
            background: rgba(220, 53, 69, 0.05);
        }

        .blog-row:hover .blog-row-title {
            color: var(--red);
        }

        .blog-row-left {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            min-width: 0;
        }

        .blog-row-title {
            font-family: var(--mono);
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text);
            transition: color 0.08s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .blog-row-excerpt {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-left: 2.1rem;
        }

        .blog-row-date {
            font-family: var(--mono);
            font-size: 0.66rem;
            color: var(--text-dim);
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* Empty state */
        .no-results {
            font-family: var(--mono);
            font-size: 0.78rem;
            color: var(--text-dim);
            padding: 3rem 0;
            text-align: center;
        }

        .no-results::before {
            content: '// ';
            color: var(--red);
        }

        @media (max-width: 600px) {
            .blog-row {
                grid-template-columns: 1fr;
            }

            .blog-row-date {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="bg-graphics">
        <div class="bg-grid"></div>
        <div class="bg-dots"></div>
        <div class="bg-blob"></div>
        <div class="bg-blob"></div>
    </div>

    <header>
        <a href="index.html" class="logo">KΞLØG</a>
        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        <nav id="nav">
            <a href="index.html">home</a>
            <a href="about.html">about</a>
            <a href="projects.html">projects</a>
            <a href="blogs.html" class="active">blog</a>
            <a href="contact.html">contact</a>
        </nav>
    </header>

    <main>
        <div class="container">

            <!-- Page Hero -->
            <section style="padding: 3rem 0 1.5rem;">
                <div class="window">
                    <div class="window-bar">
                        <div class="dot r"></div>
                        <div class="dot y"></div>
                        <div class="dot g"></div>
                        <span class="window-title">~/blogs — bash</span>
                    </div>
                    <div class="window-body" style="padding: 2rem 3rem;">
                        <div
                            style="font-size:0.72rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:2px; margin-bottom:0.6rem;">
                            blogs.txt</div>
                        <h1
                            style="font-family:var(--mono); font-size:2.4rem; font-weight:700; color:#fff; margin-bottom:1rem; letter-spacing:-0.5px;">
                            Blogs & <span style="color:var(--red)">Writeups</span></h1>
                        <p
                            style="font-family:var(--mono); font-size:0.82rem; color:var(--text-mid); max-width:560px; line-height:1.9; border-left:2px solid var(--border-red); padding-left:1rem;">
                            I share what I learn here ;)</p>
                    </div>
                </div>
            </section>

            <!-- Blog list -->
            <section style="padding: 1rem 0 2rem;">
                <div class="section-header">
                    <h2 class="section-title">all posts</h2>
                    <span id="totalCount"
                        style="font-family:var(--mono); font-size:0.7rem; color:var(--text-dim);"></span>
                </div>

                <div class="blogs-wrap">
                    <div id="blogList"></div>
                    <div id="noResults" class="no-results" style="display:none;">no posts found</div>
                </div>
            </section>

        </div>
    </main>

    <footer>
        <p>© 2026 kelog. Stay <span>curious</span>.</p>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('nav').classList.toggle('active');
        }

        async function loadBlogs() {
            try {
                const response = await fetch('blogs.json');
                const data = await response.json();
                const blogs = data.blogs;

                if (!blogs || blogs.length === 0) {
                    document.getElementById('noResults').style.display = 'block';
                    return;
                }

                document.getElementById('totalCount').textContent = `${blogs.length} post${blogs.length !== 1 ? 's' : ''}`;

                // Group by category
                const grouped = {};
                blogs.forEach(blog => {
                    if (!grouped[blog.category]) grouped[blog.category] = [];
                    grouped[blog.category].push(blog);
                });

                const list = document.getElementById('blogList');
                list.innerHTML = '';

                Object.entries(grouped).forEach(([category, posts]) => {
                    const group = document.createElement('div');
                    group.className = 'category-group open';

                    group.innerHTML = `
                        <button class="category-toggle" onclick="toggleGroup(this)">
                            <span class="dir-arrow"></span>
                            <span class="dir-folder"></span>
                            <span class="category-name">${category}/</span>
                            <span class="category-count">(${posts.length})</span>
                        </button>
                        <div class="category-body">
                            ${posts.map((blog, idx) => `
                                <div class="blog-row" onclick="window.location.href='blog.html?id=${blog.id}'">
                                    <div class="blog-row-left">
                                        <span class="blog-row-title">${blog.title}</span>
                                        <span class="blog-row-excerpt">${blog.excerpt}</span>
                                    </div>
                                    <span class="blog-row-date">${blog.date}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;

                    list.appendChild(group);
                });

            } catch (e) {
                document.getElementById('noResults').style.display = 'block';
                document.getElementById('noResults').textContent = 'could not load posts';
            }
        }

        function toggleGroup(btn) {
            const group = btn.closest('.category-group');
            group.classList.toggle('open');
        }

        loadBlogs();
    </script>
</body>

</html>
